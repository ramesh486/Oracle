      # ---------------------------------------------
      # Install Python and CD3 dependencies
      # ---------------------------------------------
      - name: 'Set up Python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Expect
        run: |
          sudo apt-get update
          sudo apt-get install -y expect util-linux moreutils tclsh

      - name: 'Install CD3 dependencies'
        run: |
          cp ~/.oci/config ~/.oci/config.txt
          ls -lrth
          pwd
          cd cd3_automation_toolkit
          pip install --upgrade pip
          pip install -r pypackages.txt
          pip install pyopenssl

 
      
      - name: 'Update Tenancy Config Properties file'
        run: |
          
          echo "Listing files in current directory:"
          ls -lrth
          cd cd3_automation_toolkit/user-scripts
          echo "Current Directory: $(pwd)"
          echo "Updating tenancyconfig.properties file"
          sed -i "s|^prefix=.*|prefix=${TENANCY_NAME}|" tenancyconfig.properties
          sed -i "s|^tenancy_ocid=.*|tenancy_ocid=${{ secrets.TENANCY_OCID }}|" tenancyconfig.properties
          sed -i "s|^region=.*|region=${{ secrets.REGION }}|" tenancyconfig.properties
          sed -i "s|^user_ocid=.*|user_ocid=${{ secrets.USER_OCID }}|" tenancyconfig.properties
          sed -i "s|^fingerprint=.*|fingerprint=${{ secrets.FINGERPRINT }}|" tenancyconfig.properties
          sed -i "s|^key_path=.*|key_path=/home/ubuntu/.oci/key.pem|" tenancyconfig.properties
          cat tenancyconfig.properties
          
